<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 240" width="1000" height="240" fill="none" role="img" aria-label="Muhammad Ramis, Software and AI Engineer, OSCP+ Penetration Tester">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0c12"/><stop offset="1" stop-color="#070912"/>
    </linearGradient>
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5cc6dd"/><stop offset="0.5" stop-color="#8278d9"/><stop offset="1" stop-color="#5cc6dd"/>
      <animate attributeName="x1" values="0;1;0" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1;2;1" dur="9s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5cc6dd" stop-opacity="0.25"/><stop offset="1" stop-color="#5cc6dd" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1000" height="240" rx="18" fill="url(#bg)"/>
  <!-- faint grid -->
  <g stroke="#1b2030" stroke-width="1" opacity="0.5">
    <path d="M0 60 H1000 M0 120 H1000 M0 180 H1000"/>
    <path d="M120 0 V240 M240 0 V240 M360 0 V240 M480 0 V240 M600 0 V240 M720 0 V240 M840 0 V240"/>
  </g>
  <ellipse cx="760" cy="120" rx="260" ry="180" fill="url(#glow)"/>

  <!-- drifting particles -->
  <g fill="#5cc6dd">
    <circle cx="90" cy="200" r="2" opacity="0.6"><animate attributeName="cy" values="200;30;200" dur="11s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.7;0" dur="11s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="210" r="1.7" opacity="0.5"><animate attributeName="cy" values="210;40;210" dur="14s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.6;0" dur="14s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="220" r="2.2" fill="#8278d9"><animate attributeName="cy" values="220;50;220" dur="9s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.7;0" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="640" cy="205" r="1.6" fill="#2fb389"><animate attributeName="cy" values="205;60;205" dur="13s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.6;0" dur="13s" repeatCount="indefinite"/></circle>
    <circle cx="910" cy="215" r="2" fill="#e06a86"><animate attributeName="cy" values="215;45;215" dur="12s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;0.6;0" dur="12s" repeatCount="indefinite"/></circle>
  </g>

  <!-- prism refracting one white beam into the four discipline colours -->
  <g transform="translate(792 120)">
    <line x1="-150" y1="0" x2="-44" y2="0" stroke="#eaf6ff" stroke-width="3" stroke-linecap="round">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.6s" repeatCount="indefinite"/>
    </line>
    <g stroke-width="3" stroke-linecap="round">
      <line x1="36" y1="2" x2="150" y2="-46" stroke="#6f78d6"/>
      <line x1="38" y1="4" x2="150" y2="-14" stroke="#2fb389"/>
      <line x1="38" y1="6" x2="150" y2="18" stroke="#e0556d"/>
      <line x1="36" y1="8" x2="150" y2="50" stroke="#e0ad42"/>
    </g>
    <path d="M0 -44 L36 30 L-36 30 Z" stroke="#5cc6dd" stroke-width="3" fill="rgba(130,120,217,0.14)" stroke-linejoin="round">
      <animateTransform attributeName="transform" type="rotate" values="-5;5;-5" dur="7s" repeatCount="indefinite"/>
    </path>
    <circle cx="0" cy="2" r="3.4" fill="#ffffff"><animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- availability -->
  <g transform="translate(64 56)">
    <circle cx="6" cy="-4" r="5" fill="#2fb389"><animate attributeName="opacity" values="1;0.35;1" dur="2.2s" repeatCount="indefinite"/></circle>
    <text x="20" y="0" font-family="'JetBrains Mono','Courier New',monospace" font-size="12.5" letter-spacing="3" fill="#8a93a7">AVAILABLE FOR WORK · NOTTINGHAM, UK</text>
  </g>

  <!-- name + roles -->
  <text x="62" y="132" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="56" font-weight="800" letter-spacing="-1.5" fill="url(#name)">Muhammad Ramis</text>
  <text x="64" y="166" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="19" font-weight="600" fill="#cdd3e0">Software &amp; AI Engineer · OSCP+ Penetration Tester</text>
  <text x="64" y="196" font-family="'JetBrains Mono','Courier New',monospace" font-size="13.5" fill="#6f778c">Java · Kafka · LLM agents · RAG · React · 10+ years building &amp; breaking</text>
</svg>
